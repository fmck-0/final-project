<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Affordable Shoes - Contact Us</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="home.html">Affordable Shoes</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="shop.html">Shop</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container my-5" style="max-width: 600px;">
    <h1 class="text-center mb-4">Contact Our Support Team</h1>
    
    <form id="contactForm">
        <div class="mb-3">
            <label for="userName" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="userName" required>
        </div>
        <div class="mb-3">
            <label for="userEmail" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="userEmail" required>
        </div>
        <div class="mb-3">
            <label for="userMessage" class="form-label">Message</label>
            <textarea class="form-control" id="userMessage" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-primary w-100">Send Message</button>
    </form>
    
    <div id="formSuccessMessage" class="alert alert-success mt-4 d-none" role="alert">
        Thank you! Your inquiry was submitted.
    </div>
</div>

<footer class="text-center bg-dark text-white" style="padding: 10px; margin-top: 40px;">
    Affordable Shoes - 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    var form = document.getElementById("contactForm");

    form.addEventListener("submit", function(event) {
        event.preventDefault();

        var banner = document.getElementById("formSuccessMessage");
        banner.classList.remove("d-none");

        document.getElementById("userName").value = "";
        document.getElementById("userEmail").value = "";
        document.getElementById("userMessage").value = "";
    });
</script>

</body>
</html>
