<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Affordable Shoes - Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .shoe-img {
            width: 250px;
            height: 250px;
            object-fit: cover;
        }
        .shoe-img-small {
            width: 200px;
            height: 200px;
            object-fit: cover;
        }
        .card {
            min-height: 420px; /* Ensures all boxes stay level */
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="home.html">Affordable Shoes</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="shop.html">Shop</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h1 class="text-center">Our Catalog</h1>

    <div class="row justify-content-center my-4">
        <div class="col-md-6 text-center">
            <label for="budgetFilter" class="form-label font-weight-bold">Filter by Maximum Budget:</label>
            <select id="budgetFilter" class="form-select">
                <option value="100">Show All Shoes</option>
                <option value="45">Under $45.00</option>
                <option value="35">Under $35.00</option>
            </select>
        </div>
    </div>

    <div class="row" id="shoeDisplayGrid"></div>
</div>

<footer class="text-center bg-dark text-white" style="padding: 10px; margin-top: 40px;">
    Affordable Shoes - 2026
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    var shoeInventory = [
        { name: "Classic Runners", price: 29.99, img: "media/placeholder1.webp", small: false },
        { name: "Urban Sneakers", price: 39.99, img: "media/placeholder2.jpeg", small: true },
        { name: "Sports Pro", price: 49.99, img: "media/placeholder3.jpg", small: true },
        { name: "Casual Loafers", price: 34.99, img: "media/placeholder4.webp", small: false },
        { name: "Comfy Slides", price: 19.99, img: "media/placeholder5.avif", small: false },
        { name: "All-Weather Boots", price: 59.99, img: "media/placeholder6.webp", small: false }
    ];

    function addToCart(shoeName) {
        alert(shoeName + " has been added to your cart!");
    }

    function filterShoes() {
        var selectedBudget = parseFloat(document.getElementById("budgetFilter").value);
        var grid = document.getElementById("shoeDisplayGrid");

        grid.innerHTML = "";

        for (var i = 0; i < shoeInventory.length; i++) {
            var shoe = shoeInventory[i];

            if (shoe.price <= selectedBudget) {
                var imgClass = shoe.small ? "shoe-img-small" : "shoe-img";

                grid.innerHTML +=
                    '<div class="col-md-4 text-center mb-4">' +
                        '<div class="card p-3 shadow-sm d-flex flex-column justify-content-between">' +
                            '<img src="' + shoe.img + '" alt="' + shoe.name + '" class="img-fluid mx-auto rounded ' + imgClass + '">' +
                            '<h4 class="mt-3">' + shoe.name + '</h4>' +
                            '<p class="text-success font-weight-bold">$' + shoe.price.toFixed(2) + '</p>' +
                            '<button onclick="addToCart(\'' + shoe.name + '\')" class="btn btn-outline-dark btn-sm mx-auto" style="width: 120px;">Add to Cart</button>' +
                        '</div>' +
                    '</div>';
            }
        }
    }

    filterShoes();

    document.getElementById("budgetFilter").addEventListener("change", filterShoes);
</script>

</body>
</html>
